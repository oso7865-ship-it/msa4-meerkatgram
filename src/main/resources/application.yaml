spring:
  application:
    name: msa4-meerkatgram
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:meerkatgram}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:msa505}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  output:
    ansi:
      enabled: ALWAYS

mybatis:
  mapper-locations: classpath:mapper/**/*Mapper.xml
  type-aliases-package: com.msa4meerkatgram

security:
  jwt:
    secure: false
    issuer: meerkat@meerkat.kr
    type: JWT
    access-token-expiry: 1000000
    refresh-token-expiry: 1296000000
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-expiry: 1296000
    secret: ${JWT_SECRET:w4e5gwe57nhwb456g3h46g34of6h9439f5h8o7os5789hflsg645eh74s57he54g734}
    header-key: Authorization
    scheme: Bearer
    reiss-uri: /api/reissue-token

cors:
  allowed-origins: ${SERVER_URI:http://localhost:8080}
  max-age: 3600

file:
  server-uri: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage-path: E:/msa/worksapce/msa4-meerkatgram/storage
  profile-path: /files/profiles
  post-path: /files/posts
  allow-extension-list: [
    "image/jpeg",
    "image/jpg",
    "image/webp",
    "image/gif",
    "image/svg",
    "image/png"
  ]

server:
  error:
    include-stacktrace: always
    include-message: always

logging:
  file:
    name: logs/error.log
  level:
    root: info
    # 로그 출력 레벨 설정(trace, debug, info, error, warn)
    com.msa4meerkatgram.controllers: debug